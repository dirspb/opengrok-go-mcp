name: Agent Confusion Report
description: An AI agent picked the wrong tool, misread a schema, missed pagination, ignored a warning, over-fetched, or could not discover the workflow.
title: "[Agent UX]: "
labels: ["agent-ux"]
body:
  - type: markdown
    attributes:
      value: |
        We treat agent confusion as product feedback, not user error.
        See `docs/reporting-issues.md` for guidance. Remove secrets, tokens,
        internal hostnames, and private source before submitting.
  - type: textarea
    id: task
    attributes:
      label: What task was the agent trying to complete?
    validations:
      required: true
  - type: textarea
    id: relied-on
    attributes:
      label: What tool description, schema, or warning did it rely on?
    validations:
      required: false
  - type: textarea
    id: first-call
    attributes:
      label: What call did the agent make first?
      description: Tool/operation name and sanitized input payload.
    validations:
      required: false
  - type: textarea
    id: confusion
    attributes:
      label: What confused it or caused the wrong behavior?
    validations:
      required: true
  - type: textarea
    id: would-help
    attributes:
      label: What wording, field, warning, or example would have helped?
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Tool surface
      options:
        - full
        - compact
        - gateway
        - unknown
    validations:
      required: false
