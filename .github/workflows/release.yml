name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify module
        run: go mod verify

      - name: Run tests
        run: go test -race -count=1 ./...

  eval-snapshot:
    name: Eval snapshot (tagged commit)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run eval suites on release commit
        run: |
          go test ./evals/ -run TestEvalSuite -count=1
          go test ./evals/ -run TestTokenBenchmark -count=1

      - name: Upload eval reports for release
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ github.ref_name }}
          path: |
            evals/report.json
            evals/report.md
            evals/token_report.json
            evals/token_report.md
          if-no-files-found: error

  release:
    name: GoReleaser
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
